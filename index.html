                group.className = 'cat-group';
                
                catData.sites.forEach(s => {

                    btn.className = `sidebar-item w-full text-left px-4 py-3 rounded-xl text-sm font-black mb-1 flex justify-between items-center ${s === currentSite ? 'active' : 'text-gray-500'}`;
